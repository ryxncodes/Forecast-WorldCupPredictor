name: Sync live World Cup data

on:
  workflow_dispatch:
  schedule:
    # GitHub cron is UTC. During the tournament this runs 12:00 PM-2:30 AM EDT.
    - cron: "*/10 16-23 * * *"
    - cron: "*/10 0-5 * * *"
    - cron: "0,10,20,30 6 * * *"

concurrency:
  group: world-cup-live-sync
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r backend/requirements.txt
      - name: Check database configuration
        run: test -n "$DATABASE_URL"
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
      - run: python scripts/sync_live_data.py
        timeout-minutes: 4
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DISABLE_DB_POOL: "true"
